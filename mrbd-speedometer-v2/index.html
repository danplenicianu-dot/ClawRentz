<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no" />
  <title>MRBD Speedometer V2</title>
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <div id="app" class="app-root">
    <main id="home" class="screen" aria-label="Speedometer">
      <section class="speed-panel" aria-live="polite">
        <div class="version-badge">MRBD V2</div>
        <div class="speed-readout">
          <span id="speed-value">0</span>
          <span class="speed-unit">km/h</span>
        </div>
        <div id="gps-status" class="gps-status">GPS oprit</div>
      </section>
      <nav class="nav-rail" aria-label="Acțiuni">
        <button id="start-button" class="nav-item focusable primary" data-action="toggle-gps" type="button">
          <span class="content">Start GPS</span>
        </button>
      </nav>
    </main>
  </div>
  <script src="app.js?v=2"></script>
</body>
</html>
