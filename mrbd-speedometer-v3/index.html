<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no" />
  <title>MRBD Speedometer V3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 600px;
      height: 600px;
      overflow: hidden;
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    #app {
      width: 600px;
      height: 600px;
      padding: 12px;
      background: #000000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
    }
    .top {
      height: 64px;
      border: 3px solid #ffffff;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .12em;
      color: #ffffff;
    }
    .middle {
      flex: 1;
      margin: 16px 0;
      border: 4px solid #ffffff;
      border-radius: 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .speed {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 16px;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(255,255,255,.32);
    }
    #value {
      font-size: 196px;
      line-height: .85;
      font-weight: 900;
      letter-spacing: -14px;
      font-variant-numeric: tabular-nums;
    }
    .unit {
      font-size: 42px;
      font-weight: 900;
    }
    #status {
      margin-top: 24px;
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
    }
    button.focusable {
      height: 96px;
      border: 4px solid #ffffff;
      border-radius: 28px;
      background: #ffffff;
      color: #000000;
      font-size: 32px;
      font-weight: 900;
    }
    button.focusable:focus {
      outline: none;
      transform: scale(.92);
      box-shadow: 0 0 38px #ffffff;
    }
  </style>
</head>
<body>
  <main id="app">
    <div class="top">MRBD V3 TEST</div>
    <section class="middle" aria-live="polite">
      <div class="speed"><span id="value">0</span><span class="unit">km/h</span></div>
      <div id="status">apasă START</div>
    </section>
    <button id="start" class="focusable" type="button">START GPS</button>
  </main>
  <script>
    const value = document.getElementById('value');
    const status = document.getElementById('status');
    const start = document.getElementById('start');
    let watch = null;
    let last = null;
    function speed(kmh){ value.textContent = String(Math.max(0, Math.round(Number.isFinite(kmh) ? kmh : 0))); }
    function msg(t){ status.textContent = t; }
    function dist(a,b){ const R=6371000,p1=a.lat*Math.PI/180,p2=b.lat*Math.PI/180,dp=(b.lat-a.lat)*Math.PI/180,dl=(b.lon-a.lon)*Math.PI/180,h=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2; return 2*R*Math.atan2(Math.sqrt(h),Math.sqrt(1-h)); }
    function fallback(c){ const cur={lat:c.latitude,lon:c.longitude,t:Date.now()}; if(!last){last=cur;return 0;} const s=(cur.t-last.t)/1000,m=dist(last,cur); last=cur; return s>0&&m>.8?(m/s)*3.6:0; }
    function stop(){ if(watch!==null){navigator.geolocation.clearWatch(watch);watch=null;} last=null; start.textContent='START GPS'; speed(0); msg('GPS oprit'); }
    function go(){ if(!navigator.geolocation){msg('GPS lipsă');return;} if(watch!==null){stop();return;} start.textContent='STOP GPS'; msg('caut GPS...'); watch=navigator.geolocation.watchPosition(p=>{const c=p.coords; const kmh=(typeof c.speed==='number'&&Number.isFinite(c.speed)&&c.speed>=0)?c.speed*3.6:fallback(c); speed(kmh); msg('GPS activ');},e=>{speed(0); msg(e&&e.code===1?'permite locația':'eroare GPS');},{enableHighAccuracy:true,maximumAge:500,timeout:12000}); }
    start.addEventListener('click', go);
    document.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();start.click();} if(e.key==='Escape'){e.preventDefault();stop();} });
    start.focus();
  </script>
</body>
</html>
