<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MRBD Speedometer</title>
  <style>
    :root{--text:rgba(255,255,255,.96);--muted:rgba(255,255,255,.62);--glass:rgba(255,255,255,.075);--border:rgba(255,255,255,.18);--shadow:rgba(0,0,0,.28)}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;background:transparent;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;min-height:100svh}.wrap{width:min(92vw,520px);aspect-ratio:1.9/1;display:grid;place-items:center;border:1px solid var(--border);border-radius:34px;background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.03));box-shadow:0 24px 80px var(--shadow),inset 0 1px 0 rgba(255,255,255,.18);backdrop-filter:blur(16px) saturate(1.15);-webkit-backdrop-filter:blur(16px) saturate(1.15);padding:22px}.speed{display:flex;align-items:baseline;justify-content:center;gap:clamp(8px,2vw,14px);letter-spacing:-.08em;text-shadow:0 8px 34px rgba(0,0,0,.32)}#value{font-size:clamp(86px,30vw,210px);font-weight:760;line-height:.82;font-variant-numeric:tabular-nums}.unit{font-size:clamp(22px,7vw,44px);font-weight:650;letter-spacing:-.04em;color:var(--muted);padding-bottom:clamp(6px,2.3vw,18px)}.status{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(92vw,520px);text-align:center;color:var(--muted);font-size:13px;letter-spacing:.02em;text-shadow:0 4px 18px rgba(0,0,0,.35)}.tap{position:fixed;inset:0;display:grid;place-items:center;background:transparent;cursor:pointer}.tap-card{border:1px solid var(--border);border-radius:28px;padding:20px 24px;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 20px 70px var(--shadow);color:var(--text);text-align:center;font-weight:650}.tap-card small{display:block;margin-top:7px;color:var(--muted);font-weight:500}.hidden{display:none}@media(prefers-color-scheme:light){:root{--text:rgba(0,0,0,.86);--muted:rgba(0,0,0,.55);--glass:rgba(255,255,255,.18);--border:rgba(0,0,0,.12);--shadow:rgba(0,0,0,.12)}}
  </style>
</head>
<body>
  <main class="wrap" aria-label="Speedometer"><div class="speed"><div id="value">0</div><div class="unit">km/h</div></div></main>
  <div id="status" class="status">Atinge ecranul pentru pornire</div>
  <div id="tap" class="tap"><div class="tap-card">Pornește speedometer<small>Permite accesul la locație</small></div></div>
  <script>
    const value=document.getElementById('value');const status=document.getElementById('status');const tap=document.getElementById('tap');let lastPos=null;let watchId=null;function setSpeed(kmh){value.textContent=String(Math.max(0,Math.round(kmh||0)))}function distance(a,b){const R=6371000;const p1=a.lat*Math.PI/180,p2=b.lat*Math.PI/180;const dp=(b.lat-a.lat)*Math.PI/180,dl=(b.lon-a.lon)*Math.PI/180;const x=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}function start(){tap.classList.add('hidden');if(!navigator.geolocation){status.textContent='GPS indisponibil în browser';return}status.textContent='Caut semnal GPS...';watchId=navigator.geolocation.watchPosition(pos=>{const c=pos.coords;let kmh=0;if(typeof c.speed==='number'&&!Number.isNaN(c.speed)){kmh=c.speed*3.6}else{const now=Date.now();const cur={lat:c.latitude,lon:c.longitude,t:now};if(lastPos){const meters=distance(lastPos,cur);const seconds=(cur.t-lastPos.t)/1000;if(seconds>0)kmh=(meters/seconds)*3.6}lastPos=cur}setSpeed(kmh);const acc=Math.round(c.accuracy||0);status.textContent=acc?`GPS activ · acuratețe ~${acc} m`:'GPS activ';},err=>{setSpeed(0);tap.classList.remove('hidden');status.textContent=err.code===1?'Permite locația ca să funcționeze':'Nu pot citi viteza GPS';},{enableHighAccuracy:true,maximumAge:500,timeout:12000})}tap.addEventListener('click',start);document.addEventListener('visibilitychange',()=>{if(document.hidden&&watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}else if(!document.hidden&&tap.classList.contains('hidden'))start()});
  </script>
</body>
</html>
